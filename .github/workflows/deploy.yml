name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.BB_DOMAIN }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            APP=${{ secrets.APP_DIR }}
            : "${APP:?APP_DIR secret is not set}"
            if [ ! -d "$APP/.git" ]; then
              git clone ${{ secrets.REPO_SSH_URL }} "$APP"
            fi
            cd "$APP"
            git fetch origin
            git checkout main
            git reset --hard origin/main
            cat > .env <<'__APP_ENV__'
            ${{ secrets.WEB_ENV }}
            __APP_ENV__
            docker network create proxy 2>/dev/null || true
            BB_DOMAIN="${{ vars.BB_DOMAIN }}" docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d --build
            docker image prune -f
